services:
  kornix-max-bot:
    container_name: kornix-max-bot
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "3000"
    # Local debug only:
    # ports:
    #   - "127.0.0.1:3000:3000"
    networks:
      kornix_meteo_net:
        aliases:
          - kornix-max-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  kornix_meteo_net:
    external: true
    name: ${KORNIX_DOCKER_NETWORK:-meteo_stack_meteo_net}
