services:
  kornix-max-bot:
    container_name: kornix-max-bot
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: ${KORNIX_MAX_BOT_CPUS:-0.25}
    mem_limit: ${KORNIX_MAX_BOT_MEM_LIMIT:-256m}
    pids_limit: ${KORNIX_MAX_BOT_PIDS_LIMIT:-128}
    env_file:
      - ../.env.production
    volumes:
      - ../certs/russian_trusted_bundle.crt:/app/certs/russian_trusted_bundle.crt:ro
    expose:
      - "3000"
    # Local debug only:
    # ports:
    #   - "127.0.0.1:3000:3000"
    networks:
      kornix_meteo_net:
        aliases:
          - kornix-max-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: ${KORNIX_MAX_BOT_LOG_MAX_SIZE:-10m}
        max-file: ${KORNIX_MAX_BOT_LOG_MAX_FILE:-5}

networks:
  kornix_meteo_net:
    external: true
    name: ${KORNIX_DOCKER_NETWORK:-kornix_prod_meteo_net}
